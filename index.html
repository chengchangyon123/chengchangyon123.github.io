<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 设计工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f1117;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .panel-hover { transition: all 0.2s ease; }
        .panel-hover:hover { border-color: #4b5563; }

        /* 拖拽分割条样式 */
        .gutter {
            background-color: #1e212b;
            cursor: col-resize;
            width: 6px;
            margin: 0 -3px;
            border-left: 1px solid #374151;
            border-right: 1px solid #374151;
            position: relative;
            z-index: 10;
            transition: background 0.2s;
        }
        .gutter:hover { background-color: #4b5563; }
        .gutter::after {
            content: "||";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: #6b7280;
            letter-spacing: 1px;
        }

        /* 新增样式 */
        /* 图片预览模态框 */
        .preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 20px;
        }
        .preview-content {
            flex: 1;
            display: flex;
            position: relative;
        }
        .preview-img {
            max-width: 80%;
            max-height: 80%;
            margin: auto;
            object-contain;
        }
        .preview-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .preview-control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1e212b;
            border: 1px solid #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .preview-control-btn:hover {
            background: #4b5563;
        }
        .mask-color-picker {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .color-block {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .color-block.active {
            border-color: #ffffff;
        }
        .preview-edit-input {
            width: 80%;
            margin: 20px auto 0;
            background: #1e212b;
            border: 1px solid #374151;
            border-radius: 4px;
            padding: 10px;
            color: #e2e8f0;
        }
        .lasso-tool {
            position: absolute;
            border: 1px dashed #ffffff;
            background: rgba(255,255,255,0.1);
            pointer-events: none;
            display: none;
        }

        /* 操作区图片容器 */
        .operate-images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            height: 100%;
            overflow-y: auto;
        }
        .operate-img-item {
            position: relative;
            aspect-ratio: 4/3;
            border-radius: 4px;
            overflow: hidden;
            background: #1e212b;
        }
        .operate-img-number {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 20px;
            height: 20px;
            background: #0f1117;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            cursor: move;
            z-index: 1;
        }
        .operate-img {
            width: 100%;
            height: 100%;
            object-cover;
        }

        /* 生成结果区图片样式 */
        .result-img-item {
            position: relative;
            cursor: move;
        }
        .result-img-controls {
            position: absolute;
            top: 4px;
            right: 4px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .result-img-item:hover .result-img-controls {
            opacity: 1;
        }
        .result-img-btn {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            background: #1e212b;
            border: 1px solid #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }

        /* 预设提示词弹窗 */
        .prompt-presets {
            position: absolute;
            bottom: 100%;
            right: 0;
            width: 300px;
            background: #1e212b;
            border: 1px solid #374151;
            border-radius: 4px;
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 8px;
            z-index: 5;
        }
        .preset-item {
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .preset-item:hover {
            background: #374151;
        }

        /* 历史记录界面 */
        .history-interface {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f1117;
            z-index: 200;
            display: none;
            flex-direction: column;
            padding: 20px;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #374151;
        }
        .history-close {
            padding: 8px 16px;
            background: #4b5563;
            border-radius: 4px;
            cursor: pointer;
        }
        .history-packages {
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            flex: 1;
        }
        .history-package {
            background: #1e212b;
            border-radius: 8px;
            padding: 16px;
        }
        .package-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .package-date {
            font-weight: bold;
        }
        .package-delete {
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
        }
        .package-images {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
        }
        .package-img-item {
            position: relative;
            aspect-ratio: 4/3;
            border-radius: 4px;
            overflow: hidden;
        }
        .package-img {
            width: 100%;
            height: 100%;
            object-cover;
        }
        .package-img-delete {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            color: #ef4444;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .package-img-item:hover .package-img-delete {
            opacity: 1;
        }

        /* 文字生图界面 */
        .text2img-interface {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f1117;
            z-index: 150;
            display: none;
            flex-direction: column;
            padding: 20px;
        }
        .text2img-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #374151;
        }
        .text2img-close {
            padding: 8px 16px;
            background: #4b5563;
            border-radius: 4px;
            cursor: pointer;
        }
        .text2img-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .text2img-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .text2img-control-group {
            background: #1e212b;
            padding: 10px;
            border-radius: 4px;
        }
        .text2img-result {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            overflow-y: auto;
        }

        /* 邀请码弹窗 */
        .invite-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e212b;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 20px;
            z-index: 200;
            display: none;
            min-width: 300px;
        }
        .invite-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .invite-code {
            padding: 10px;
            background: #0f1117;
            border-radius: 4px;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .copy-btn {
            padding: 4px 8px;
            background: #374151;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .invite-close {
            align-self: flex-end;
            padding: 8px 16px;
            background: #4b5563;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 积分相关弹窗 */
        .score-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e212b;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 20px;
            z-index: 200;
            display: none;
            min-width: 400px;
        }
        .score-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .score-close {
            align-self: flex-end;
            padding: 8px 16px;
            background: #4b5563;
            border-radius: 4px;
            cursor: pointer;
        }
        .recharge-link {
            color: #3b82f6;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <!-- 顶部导航 -->
    <header class="h-12 flex items-center justify-between px-4 border-b border-gray-800 bg-[#12141a]">
        <div class="flex items-center gap-2">
            <button class="p-2 rounded hover:bg-gray-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <span id="backToText2Img" class="text-sm text-gray-400 cursor-pointer">返回创作风暴</span>
        </div>
        <div class="flex items-center gap-4">
            <button id="inviteBtn" class="text-sm px-3 py-1 rounded hover:bg-gray-800">邀请加入</button>
            <button id="resourceBtn" class="text-sm px-3 py-1 rounded hover:bg-gray-800">资源管理</button>
            <div class="relative group">
                <button id="scoreBtn" class="text-sm px-3 py-1 rounded bg-gray-800 hover:bg-gray-700 flex items-center gap-1">
                    <span>积分: 2870</span>
                </button>
                <div class="absolute right-0 top-full mt-2 w-48 bg-[#1e212b] rounded shadow-lg border border-gray-700 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                    <div class="p-3 border-b border-gray-700">
                        <p class="text-xs text-gray-400">当前积分: 2870</p>
                    </div>
                    <button id="rechargeBtn" class="w-full text-left px-3 py-2 text-sm hover:bg-gray-800">充值积分</button>
                    <button id="priceRuleBtn" class="w-full text-left px-3 py-2 text-sm hover:bg-gray-800">收费标准</button>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区 + 拖拽布局 -->
    <main id="mainContainer" class="flex-1 flex overflow-hidden relative">
        <!-- 左侧操作区 -->
        <section id="leftPanel" class="h-full flex flex-col p-4 border-r border-gray-800" style="width:45%;min-width:300px;max-width:70%;">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs text-gray-400">操作区</span>
            </div>
            <div class="flex-1 border-2 border-dashed border-gray-700 rounded-lg p-2 relative panel-hover overflow-hidden">
                <!-- 操作区图片容器 -->
                <div id="operateImagesContainer" class="operate-images">
                    <!-- 初始示例图片 -->
                    <div class="operate-img-item" draggable="true">
                        <div class="operate-img-number">1</div>
                        <img src="https://picsum.photos/seed/building/800/1000" class="operate-img" alt="上传图片">
                    </div>
                </div>
                <button id="addImageBtn" class="absolute bottom-2 right-2 w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center hover:bg-gray-700">+</button>
            </div>
        </section>

        <!-- 拖拽分割条 -->
        <div id="dragGutter" class="gutter"></div>

        <!-- 中间生成区 -->
        <section id="rightPanel" class="flex-1 h-full p-4 overflow-y-auto scrollbar-hide">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs text-gray-400">生成结果区</span>
            </div>
            <div id="resultImagesContainer" class="grid grid-cols-3 gap-4">
                <div class="result-img-item aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover" draggable="true">
                    <div class="result-img-controls">
                        <div class="result-img-btn delete-result-img">×</div>
                        <div class="result-img-btn download-result-img">↓</div>
                    </div>
                    <img src="https://picsum.photos/seed/result1/400/300" class="w-full h-full object-cover" alt="生成结果1">
                </div>
                <div class="result-img-item aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover" draggable="true">
                    <div class="result-img-controls">
                        <div class="result-img-btn delete-result-img">×</div>
                        <div class="result-img-btn download-result-img">↓</div>
                    </div>
                    <img src="https://picsum.photos/seed/result2/400/300" class="w-full h-full object-cover" alt="生成结果2">
                </div>
                <div class="result-img-item aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover" draggable="true">
                    <div class="result-img-controls">
                        <div class="result-img-btn delete-result-img">×</div>
                        <div class="result-img-btn download-result-img">↓</div>
                    </div>
                    <img src="https://picsum.photos/seed/result3/400/300" class="w-full h-full object-cover" alt="生成结果3">
                </div>
                <div class="result-img-item aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover" draggable="true">
                    <div class="result-img-controls">
                        <div class="result-img-btn delete-result-img">×</div>
                        <div class="result-img-btn download-result-img">↓</div>
                    </div>
                    <img src="https://picsum.photos/seed/result4/400/300" class="w-full h-full object-cover" alt="生成结果4">
                </div>
                <div class="result-img-item aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover" draggable="true">
                    <div class="result-img-controls">
                        <div class="result-img-btn delete-result-img">×</div>
                        <div class="result-img-btn download-result-img">↓</div>
                    </div>
                    <img src="https://picsum.photos/seed/result5/400/300" class="w-full h-full object-cover" alt="生成结果5">
                </div>
                <div class="result-img-item aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover" draggable="true">
                    <div class="result-img-controls">
                        <div class="result-img-btn delete-result-img">×</div>
                        <div class="result-img-btn download-result-img">↓</div>
                    </div>
                    <img src="https://picsum.photos/seed/result6/400/300" class="w-full h-full object-cover" alt="生成结果6">
                </div>
            </div>
        </section>

        <!-- 右侧预设区 -->
        <aside class="w-64 h-full bg-[#12141a] border-l border-gray-800 p-4 overflow-y-auto scrollbar-hide">
            <div class="mb-4">
                <span class="text-sm font-medium">右侧预设键</span>
            </div>
            <div class="space-y-2">
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">超级融合</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">平面布局</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">空间分镜</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">SU转效果图</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">空间爆炸</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">材料排版</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">一键彩平</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">景观彩平</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">灯光氛围</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">通道转换</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">彩平转轴测图</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">软装分析</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">地域分析</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">概念推演</button>
            </div>
        </aside>
    </main>

    <!-- 底部输入栏 -->
    <footer class="h-16 border-t border-gray-800 bg-[#12141a] flex items-center px-4 gap-4">
        <div class="flex-1 relative">
            <input id="promptInput" type="text" placeholder="输入提示词..." class="w-full bg-[#1e212b] rounded px-4 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gray-600">
            <!-- 预设提示词弹窗 -->
            <div id="promptPresets" class="prompt-presets">
                <div class="preset-item" data-prompt="现代简约风格，高清，自然光，建筑效果图">现代简约建筑效果图</div>
                <div class="preset-item" data-prompt="新中式风格，园林景观，黄昏，细节丰富">新中式园林景观</div>
                <div class="preset-item" data-prompt="工业风，loft空间，金属质感，高对比度">工业风LOFT空间</div>
                <div class="preset-item" data-prompt="添加自定义预设" onclick="addCustomPreset()">+ 添加自定义预设</div>
            </div>
            <button id="presetBtn" class="absolute right-2 top-1/2 transform -translate-y-1/2 bg-gray-700 rounded px-2 py-1 text-xs">预设</button>
        </div>
        <button id="generateBtn" class="px-4 py-2 rounded bg-blue-600 hover:bg-blue-500 text-sm">
            生成 <span id="scoreConsume">(消耗: 50积分)</span>
        </button>
    </footer>

    <!-- 图片预览修改模态框 -->
    <div id="previewModal" class="preview-modal">
        <div class="preview-content">
            <div class="lasso-tool" id="lassoTool"></div>
            <!-- 遮罩颜色选择 -->
            <div class="mask-color-picker">
                <div class="color-block active" style="background: red;" data-color="red"></div>
                <div class="color-block" style="background: yellow;" data-color="yellow"></div>
                <div class="color-block" style="background: green;" data-color="green"></div>
                <div class="color-block" style="background: blue;" data-color="blue"></div>
                <div class="color-block" style="background: white;" data-color="white"></div>
            </div>
            <img id="previewImage" class="preview-img" src="" alt="预览图片">
            <!-- 预览控制按钮 -->
            <div class="preview-controls">
                <div class="preview-control-btn" id="compareBtn" title="原图/现图对比">↔</div>
                <div class="preview-control-btn" id="downloadBtn" title="下载图片">↓</div>
                <div class="preview-control-btn" id="deleteBtn" title="删除图片">×</div>
                <div class="preview-control-btn" id="lassoBtn" title="套索工具">✎</div>
                <div class="preview-control-btn" id="closePreviewBtn" title="关闭预览">✕</div>
            </div>
        </div>
        <input id="previewEditInput" class="preview-edit-input" placeholder="输入修改提示词...">
        <button id="applyEditBtn" class="w-40 mx-auto mt-10 py-2 bg-blue-600 rounded hover:bg-blue-500 text-sm">应用修改</button>
    </div>

    <!-- 文字生图界面 -->
    <div id="text2imgInterface" class="text2img-interface">
        <div class="text2img-header">
            <h2>创作风暴 - 文字生图</h2>
            <div class="text2img-close" id="closeText2ImgBtn">关闭</div>
        </div>
        <div class="text2img-content">
            <div class="text2img-controls">
                <div class="text2img-control-group">
                    <h4 class="mb-2">质量控制</h4>
                    <!-- 隐藏了极速/大模型选择/画质 -->
                </div>
                <div class="text2img-control-group">
                    <h4 class="mb-2">画幅</h4>
                    <!-- 隐藏了所有画幅选项 -->
                </div>
                <div class="text2img-control-group">
                    <h4 class="mb-2">分辨率</h4>
                    <!-- 隐藏了1K/2K/4K -->
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex-1 relative">
                    <input id="text2imgPromptInput" type="text" placeholder="输入提示词..." class="w-full bg-[#1e212b] rounded px-4 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gray-600">
                    <button id="text2imgPresetBtn" class="absolute right-2 top-1/2 transform -translate-y-1/2 bg-gray-700 rounded px-2 py-1 text-xs">预设</button>
                </div>
                <button id="text2imgGenerateBtn" class="px-4 py-2 rounded bg-blue-600 hover:bg-blue-500 text-sm">
                    生成 <span id="text2imgScoreConsume">(消耗: 50积分)</span>
                </button>
            </div>

    <!-- 积分相关弹窗 -->
    <div id="scoreModal" class="score-modal">

        </div>
        <button class="score-close" id="closeScoreBtn">关闭</button>

    <!-- 拖拽功能 JS -->
    <script>
        // 原有拖拽分割条功能
        const leftPanel = document.getElementById('leftPanel');
        const rightPanel = document.getElementById('rightPanel');
        const gutter = document.getElementById('dragGutter');
        const container = document.getElementById('mainContainer');

        let isDragging = false;

        gutter.addEventListener('mousedown', (e) => {
            isDragging = true;
            document.body.style.cursor = 'col-resize';
            e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const containerRect = container.getBoundingClientRect();
            const percent = (e.clientX - containerRect.left) / containerRect.width * 100;
            
            // 限制最小/最大宽度
            if(percent > 25 && percent < 70){
                leftPanel.style.width = percent + '%';
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            document.body.style.cursor = '';
        });

        // 1. 生成按钮积分显示
        // 根据质量动态更新积分消耗（示例：默认50，可根据实际逻辑调整）
        let currentQuality = 'standard';
        const scoreConsumeEl = document.getElementById('scoreConsume');
        const text2imgScoreConsumeEl = document.getElementById('text2imgScoreConsume');
        
        // 示例：切换质量时更新积分
        function updateScoreConsume(quality) {
            let score = 50;
            if (quality === 'high') score = 100;
            if (quality === 'ultra') score = 200;
            
            scoreConsumeEl.textContent = `(消耗: ${score}积分)`;
            text2imgScoreConsumeEl.textContent = `(消耗: ${score}积分)`;
            currentQuality = quality;
        }

        // 2. 提示词预设功能
        const presetBtn = document.getElementById('presetBtn');
        const promptPresets = document.getElementById('promptPresets');
        const promptInput = document.getElementById('promptInput');
        const text2imgPresetBtn = document.getElementById('text2imgPresetBtn');
        const text2imgPromptInput = document.getElementById('text2imgPromptInput');

        // 切换预设弹窗显示
        presetBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            promptPresets.style.display = promptPresets.style.display === 'flex' ? 'none' : 'flex';
        });

        text2imgPresetBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            // 复用相同的预设列表（可自定义）
            promptPresets.style.display = promptPresets.style.display === 'flex' ? 'none' : 'flex';
        });

        // 点击预设项填充提示词
        document.querySelectorAll('.preset-item').forEach(item => {
            if (!item.hasAttribute('onclick')) {
                item.addEventListener('click', () => {
                    const prompt = item.getAttribute('data-prompt');
                    if (document.getElementById('text2imgInterface').style.display === 'flex') {
                        text2imgPromptInput.value = prompt;
                    } else {
                        promptInput.value = prompt;
                    }
                    promptPresets.style.display = 'none';
                });
            }
        });

        // 点击空白处关闭预设弹窗
        document.addEventListener('click', () => {
            promptPresets.style.display = 'none';
        });

        // 添加自定义预设
        function addCustomPreset() {
            const customPrompt = prompt('请输入自定义预设提示词:');
            if (customPrompt) {
                const newPreset = document.createElement('div');
                newPreset.className = 'preset-item';
                newPreset.setAttribute('data-prompt', customPrompt);
                newPreset.textContent = customPrompt.length > 20 ? customPrompt.substring(0, 20) + '...' : customPrompt;
                newPreset.addEventListener('click', () => {
                    if (document.getElementById('text2imgInterface').style.display === 'flex') {
                        text2imgPromptInput.value = customPrompt;
                    } else {
                        promptInput.value = customPrompt;
                    }
                    promptPresets.style.display = 'none';
                });
                // 插入到添加按钮前
                promptPresets.insertBefore(newPreset, document.querySelector('.preset-item[onclick]'));
            }
        }

        // 3. 图片预览修改功能
        const previewModal = document.getElementById('previewModal');
        const previewImage = document.getElementById('previewImage');
        const closePreviewBtn = document.getElementById('closePreviewBtn');
        const compareBtn = document.getElementById('compareBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const deleteBtn = document.getElementById('deleteBtn');
        const lassoBtn = document.getElementById('lassoBtn');
        const lassoTool = document.getElementById('lassoTool');
        const previewEditInput = document.getElementById('previewEditInput');
        const applyEditBtn = document.getElementById('applyEditBtn');
        const colorBlocks = document.querySelectorAll('.color-block');
        
        // 遮罩颜色选择
        colorBlocks.forEach(block => {
            block.addEventListener('click', () => {
                colorBlocks.forEach(b => b.classList.remove('active'));
                block.classList.add('active');
                // 实际项目中这里会设置涂抹遮罩的颜色
                console.log('选择遮罩颜色:', block.getAttribute('data-color'));
            });
        });

        // 套索工具
        let isLassoActive = false;
        let lassoStartX = 0;
        let lassoStartY = 0;
        
        lassoBtn.addEventListener('click', () => {
            isLassoActive = !isLassoActive;
            lassoBtn.style.background = isLassoActive ? '#4b5563' : '#1e212b';
            lassoTool.style.display = isLassoActive ? 'block' : 'none';
        });

        // 套索绘制
        previewModal.addEventListener('mousedown', (e) => {
            if (!isLassoActive) return;
            
            const previewContent = document.querySelector('.preview-content');
            const rect = previewContent.getBoundingClientRect();
            
            lassoStartX = e.clientX - rect.left;
            lassoStartY = e.clientY - rect.top;
            
            lassoTool.style.left = lassoStartX + 'px';
            lassoTool.style.top = lassoStartY + 'px';
            lassoTool.style.width = '0px';
            lassoTool.style.height = '0px';

            const onMouseMove = (e) => {
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const width = x - lassoStartX;
                const height = y - lassoStartY;
                
                lassoTool.style.width = Math.abs(width) + 'px';
                lassoTool.style.height = Math.abs(height) + 'px';
                lassoTool.style.left = width < 0 ? x + 'px' : lassoStartX + 'px';
                lassoTool.style.top = height < 0 ? y + 'px' : lassoStartY + 'px';
            };

            const onMouseUp = () => {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            };

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });

        // 滚轮调整画笔大小（示例）
        previewModal.addEventListener('wheel', (e) => {
            // 实际项目中这里会调整画笔大小
            const delta = e.deltaY > 0 ? -1 : 1; // 上滚增大，下滚减小
            console.log('画笔大小调整:', delta);
            e.preventDefault();
        });

        // 打开预览
        document.querySelectorAll('.result-img-item img').forEach(img => {
            img.addEventListener('click', () => {
                previewImage.src = img.src;
                previewModal.style.display = 'flex';
                // 存储当前图片元素
                previewModal.setAttribute('data-img-src', img.src);
                previewModal.setAttribute('data-img-parent', img.parentElement);
            });
        });

        // 关闭预览
        closePreviewBtn.addEventListener('click', () => {
            previewModal.style.display = 'none';
            isLassoActive = false;
            lassoBtn.style.background = '#1e212b';
            lassoTool.style.display = 'none';
        });

        // 原图/现图对比
        let isOriginal = true;
        compareBtn.addEventListener('click', () => {
            isOriginal = !isOriginal;
            // 实际项目中切换原图和修改后的图
            compareBtn.style.background = isOriginal ? '#4b5563' : '#1e212b';
            console.log('切换对比:', isOriginal ? '原图' : '现图');
        });

        // 下载图片
        downloadBtn.addEventListener('click', () => {
            const a = document.createElement('a');
            a.href = previewImage.src;
            a.download = 'ai-design-' + new Date().getTime() + '.jpg';
            a.click();
        });

        // 删除图片
        deleteBtn.addEventListener('click', () => {
            const parentEl = document.querySelector(previewModal.getAttribute('data-img-parent'));
            if (parentEl) parentEl.remove();
            previewModal.style.display = 'none';
        });

        // 应用修改
        applyEditBtn.addEventListener('click', () => {
            const editPrompt = previewEditInput.value;
            if (editPrompt) {
                console.log('应用修改提示词:', editPrompt);
                // 实际项目中发送修改请求
                alert('修改已应用！');
            } else {
                alert('请输入修改提示词！');
            }
        });

        // 5. 生成结果区图片拖拽排序和删除/下载
        const resultContainer = document.getElementById('resultImagesContainer');
        
        // 拖拽排序
        let draggedItem = null;
        resultContainer.addEventListener('dragstart', (e) => {
            if (e.target.closest('.result-img-item')) {
                draggedItem = e.target.closest('.result-img-item');
                setTimeout(() => {
                    draggedItem.style.opacity = '0.5';
                }, 0);
            }
        });

        resultContainer.addEventListener('dragend', () => {
            if (draggedItem) {
                draggedItem.style.opacity = '1';
                draggedItem = null;
            }
        });

        resultContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            const afterElement = getDragAfterElement(resultContainer, e.clientX);
            const draggable = draggedItem;
            if (afterElement == null) {
                resultContainer.appendChild(draggable);
            } else {
                resultContainer.insertBefore(draggable, afterElement);
            }
        });

        function getDragAfterElement(container, x) {
            const draggableElements = [...container.querySelectorAll('.result-img-item:not(.dragging)')];
            
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = x - box.left - box.width / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // 删除生成结果图片
        document.querySelectorAll('.delete-result-img').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                btn.closest('.result-img-item').remove();
            });
        });

        // 下载生成结果图片
        document.querySelectorAll('.download-result-img').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const img = btn.closest('.result-img-item').querySelector('img');
                const a = document.createElement('a');
                a.href = img.src;
                a.download = 'ai-result-' + new Date().getTime() + '.jpg';
                a.click();
            });
        });

        // 6. 操作区多张图片管理
        const operateContainer = document.getElementById('operateImagesContainer');
        const addImageBtn = document.getElementById('addImageBtn');
        
        // 添加图片
        addImageBtn.addEventListener('click', () => {
            const imgCount = operateContainer.children.length;
            if (imgCount >= 12) {
                alert('最多只能添加12张图片！');
                return;
            }
            
            const newImgItem = document.createElement('div');
            newImgItem.className = 'operate-img-item';
            newImgItem.draggable = true;
            
            const imgNumber = document.createElement('div');
            imgNumber.className = 'operate-img-number';
            imgNumber.textContent = imgCount + 1;
            
            const img = document.createElement('img');
            img.className = 'operate-img';
            img.src = `https://picsum.photos/seed/${Math.random()}/800/1000`;
            img.alt = `操作图片${imgCount + 1}`;
            
            newImgItem.appendChild(imgNumber);
            newImgItem.appendChild(img);
            operateContainer.appendChild(newImgItem);
            
            // 更新数字编号
            updateOperateImageNumbers();
        });

        // 更新操作区图片编号
        function updateOperateImageNumbers() {
            const items = operateContainer.querySelectorAll('.operate-img-item');
            items.forEach((item, index) => {
                item.querySelector('.operate-img-number').textContent = index + 1;
            });
        }

        // 操作区图片拖拽排序
        operateContainer.addEventListener('dragstart', (e) => {
            if (e.target.closest('.operate-img-item')) {
                draggedItem = e.target.closest('.operate-img-item');
                setTimeout(() => {
                    draggedItem.style.opacity = '0.5';
                }, 0);
            }
        });

        operateContainer.addEventListener('dragend', () => {
            if (draggedItem) {
                draggedItem.style.opacity = '1';
                updateOperateImageNumbers();
                draggedItem = null;
            }
        });

        operateContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            const afterElement = getDragAfterElement(operateContainer, e.clientX);
            const draggable = draggedItem;
            if (afterElement == null) {
                operateContainer.appendChild(draggable);
            } else {
                operateContainer.insertBefore(draggable, afterElement);
            }
        });

        // DEL键删除操作区图片
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Delete' && document.activeElement.tagName !== 'INPUT') {
                const activeItem = document.querySelector('.operate-img-item:hover');
                if (activeItem) {
                    activeItem.remove();
                    updateOperateImageNumbers();
                }
            }
        });

        // 7. 生成结果区图片拖拽到操作区
        resultContainer.addEventListener('dragend', (e) => {
            if (draggedItem && e.target.closest('#leftPanel')) {
                const imgCount = operateContainer.children.length;
                if (imgCount >= 12) {
                    alert('最多只能添加12张图片！');
                    return;
                }
                
                // 复制图片到操作区
                const imgSrc = draggedItem.querySelector('img').src;
                const newImgItem = document.createElement('div');
                newImgItem.className = 'operate-img-item';
                newImgItem.draggable = true;
                
                const imgNumber = document.createElement('div');
                imgNumber.className = 'operate-img-number';
                imgNumber.textContent = imgCount + 1;
                
                const img = document.createElement('img');
                img.className = 'operate-img';
                img.src = imgSrc;
                img.alt = `操作图片${imgCount + 1}`;
                
                newImgItem.appendChild(imgNumber);
                newImgItem.appendChild(img);
                operateContainer.appendChild(newImgItem);
                
                updateOperateImageNumbers();
            }
        });

        // 8. 返回创作风暴（文字生图界面）
        const backToText2Img = document.getElementById('backToText2Img');
        const text2imgInterface = document.getElementById('text2imgInterface');
        const closeText2ImgBtn = document.getElementById('closeText2ImgBtn');
        
        backToText2Img.addEventListener('click', () => {
            text2imgInterface.style.display = 'flex';
        });

        closeText2ImgBtn.addEventListener('click', () => {
            text2imgInterface.style.display = 'none';
        });

        // 9. 文字生图结果自动进入主界面生成结果区
        const text2imgGenerateBtn = document.getElementById('text2imgGenerateBtn');
        const text2imgResult = document.getElementById('text2imgResult');
        
        text2imgGenerateBtn.addEventListener('click', () => {
            const prompt = text2imgPromptInput.value;
            if (!prompt) {
                alert('请输入提示词！');
                return;
            }
            
            // 生成示例图片
            const newResultImg = document.createElement('div');
            newResultImg.className = 'result-img-item aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover';
            newResultImg.draggable = true;
            
            const controls = document.createElement('div');
            controls.className = 'result-img-controls';
            
            const deleteBtn = document.createElement('div');
            deleteBtn.className = 'result-img-btn delete-result-img';
            deleteBtn.textContent = '×';
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                newResultImg.remove();
            });
            
            const downloadBtn = document.createElement('div');
            downloadBtn.className = 'result-img-btn download-result-img';
            downloadBtn.textContent = '↓';
            downloadBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const img = newResultImg.querySelector('img');
                const a = document.createElement('a');
                a.href = img.src;
                a.download = 'ai-text2img-' + new Date().getTime() + '.jpg';
                a.click();
            });
            
            controls.appendChild(deleteBtn);
            controls.appendChild(downloadBtn);
            
            const img = document.createElement('img');
            img.src = `https://picsum.photos/seed/${Math.random()}/400/300`;
            img.className = 'w-full h-full object-cover';
            img.alt = '文字生图结果';
            
            img.addEventListener('click', () => {
                previewImage.src = img.src;
                previewModal.style.display = 'flex';
                previewModal.setAttribute('data-img-src', img.src);
                previewModal.setAttribute('data-img-parent', newResultImg);
            });
            
            newResultImg.appendChild(controls);
            newResultImg.appendChild(img);
            
            // 添加到文字生图结果区
            text2imgResult.appendChild(newResultImg.cloneNode(true));
            
            // 添加到主界面生成结果区
            resultContainer.appendChild(newResultImg);
            
            alert('文字生图完成，结果已同步到主界面！');
        });

        // 10. 资源管理/历史记录
        const resourceBtn = document.getElementById('resourceBtn');
        const historyInterface = document.getElementById('historyInterface');
        const closeHistoryBtn = document.getElementById('closeHistoryBtn');
        
        resourceBtn.addEventListener('click', () => {
            historyInterface.style.display = 'flex';
        });

        closeHistoryBtn.addEventListener('click', () => {
            historyInterface.style.display = 'none';
        });

        // 删除历史图片
        function deleteHistoryImg(el) {
            el.closest('.package-img-item').remove();
        }

        // 删除历史包
        function deletePackage(el) {
            if (confirm('确定删除这个日期的所有图片吗？')) {
                el.closest('.history-package').remove();
            }
        }

        // 11. 积分相关弹窗
        const scoreBtn = document.getElementById('scoreBtn');
        const rechargeBtn = document.getElementById('rechargeBtn');
        const priceRuleBtn = document.getElementById('priceRuleBtn');
        const scoreModal = document.getElementById('scoreModal');
        const scoreModalContent = document.getElementById('scoreModalContent');
        const closeScoreBtn = document.getElementById('closeScoreBtn');
        
        // 充值积分
        rechargeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            scoreModalContent.innerHTML = `
                <h3>充值积分</h3>
                <p>请点击以下链接进行积分充值：</p>
                <a href="https://example.com/recharge" target="_blank" class="recharge-link">https://example.com/recharge</a>
                <div class="recharge-options">
                    <div class="my-2">充值套餐：</div>
                    <div class="flex gap-2 flex-wrap">
                        <div class="bg-gray-800 p-2 rounded">100积分 - ¥10</div>
                        <div class="bg-gray-800 p-2 rounded">500积分 - ¥45</div>
                        <div class="bg-gray-800 p-2 rounded">1000积分 - ¥80</div>
                    </div>
                </div>
            `;
            scoreModal.style.display = 'block';
        });

        // 收费标准
        priceRuleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            scoreModalContent.innerHTML = `
                <h3>收费标准和细则</h3>
                <div class="text-sm space-y-2">
                    <p>1. 标准质量生成：50积分/张</p>
                    <p>2. 高质量生成：100积分/张</p>
                    <p>3. 超高质量生成：200积分/张</p>
                    <p>4. 图片修改：30积分/次</p>
                    <p>5. 积分有效期：充值后12个月</p>
                    <p>6. 取消生成不扣除积分</p>
                    <p>7. 生成失败可申请积分退还</p>
                </div>
            `;
            scoreModal.style.display = 'block';
        });

        closeScoreBtn.addEventListener('click', () => {
            scoreModal.style.display = 'none';
        });

        // 12. 邀请加入弹窗
        const inviteBtn = document.getElementById('inviteBtn');
        const inviteModal = document.getElementById('inviteModal');
        const closeInviteBtn = document.getElementById('closeInviteBtn');
        const inviteCode = document.getElementById('inviteCode');
        
        // 生成随机邀请码
        function generateInviteCode() {
            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let code = 'AI';
            for (let i = 0; i < 3; i++) {
                code += chars[Math.floor(Math.random() * chars.length)];
            }
            code += '-';
            for (let i = 0; i < 3; i++) {
                code += chars[Math.floor(Math.random() * chars.length)];
            }
            code += '-';
            for (let i = 0; i < 3; i++) {
                code += chars[Math.floor(Math.random() * chars.length)];
            }
            return code;
        }

        inviteBtn.addEventListener('click', () => {
            // 每次点击生成新的邀请码
            inviteCode.textContent = generateInviteCode();
            inviteModal.style.display = 'block';
        });

        closeInviteBtn.addEventListener('click', () => {
            inviteModal.style.display = 'none';
        });

        // 复制邀请码
        function copyInviteCode() {
            const code = inviteCode.textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('邀请码已复制！');
            });
        }
    </script>
</body>
</html>
