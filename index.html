<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 建筑设计工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f1117;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .panel-hover {
            transition: all 0.2s ease;
        }
        .panel-hover:hover {
            border-color: #4b5563;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <!-- 顶部导航栏 -->
    <header class="h-12 flex items-center justify-between px-4 border-b border-gray-800 bg-[#12141a]">
        <div class="flex items-center gap-2">
            <button class="p-2 rounded hover:bg-gray-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <span class="text-sm text-gray-400">返回我的资产</span>
        </div>
        <div class="flex items-center gap-4">
            <button class="text-sm px-3 py-1 rounded hover:bg-gray-800">邀请加入</button>
            <button class="text-sm px-3 py-1 rounded hover:bg-gray-800">资源管理</button>
            <div class="relative group">
                <button class="text-sm px-3 py-1 rounded bg-gray-800 hover:bg-gray-700 flex items-center gap-1">
                    <span>积分: 2870</span>
                </button>
                <!-- 隐藏的充值/收费下拉菜单 -->
                <div class="absolute right-0 top-full mt-2 w-48 bg-[#1e212b] rounded shadow-lg border border-gray-700 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                    <div class="p-3 border-b border-gray-700">
                        <p class="text-xs text-gray-400">当前积分: 2870</p>
                    </div>
                    <button class="w-full text-left px-3 py-2 text-sm hover:bg-gray-800">充值积分</button>
                    <button class="w-full text-left px-3 py-2 text-sm hover:bg-gray-800">收费标准</button>
                </div>
            </div>
            <button class="p-2 rounded hover:bg-gray-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16l4-4-4-4m4 8l4-4-4-4"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="flex-1 flex overflow-hidden">
        <!-- 左侧操作区 -->
        <section class="w-[45%] h-full flex flex-col p-4 border-r border-gray-800">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs text-gray-400">UPLOADED IMAGES ... /10</span>
                <div class="flex items-center gap-2">
                    <span class="text-xs text-gray-400">Ctrl ⌘</span>
                    <button class="text-xs px-2 py-0.5 rounded hover:bg-gray-800">多选</button>
                </div>
            </div>
            <div class="flex-1 border-2 border-dashed border-gray-700 rounded-lg p-2 relative panel-hover overflow-hidden">
                <!-- 示例图片 -->
                <img src="https://picsum.photos/seed/building/800/1000" class="w-full h-full object-cover rounded" alt="上传的建筑图">
                <button class="absolute bottom-2 right-2 w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center hover:bg-gray-700">
                    <span class="text-xl">+</span>
                </button>
            </div>
            <!-- 左侧功能修改按钮（可折叠） -->
            <div class="mt-4">
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">修改功能面板</button>
            </div>
        </section>

        <!-- 中间生成结果区 -->
        <section class="flex-1 h-full p-4 overflow-y-auto scrollbar-hide">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs text-gray-400">GENERATED RESULTS</span>
                <div class="flex gap-2">
                    <button class="text-xs px-2 py-0.5 rounded bg-gray-700">全部</button>
                    <button class="text-xs px-2 py-0.5 rounded hover:bg-gray-800">图片</button>
                    <button class="text-xs px-2 py-0.5 rounded hover:bg-gray-800">视频</button>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <!-- 生成结果示例 -->
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover">
                    <img src="https://picsum.photos/seed/result1/400/300" class="w-full h-full object-cover" alt="生成结果1">
                </div>
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover">
                    <img src="https://picsum.photos/seed/result2/400/300" class="w-full h-full object-cover" alt="生成结果2">
                </div>
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover">
                    <img src="https://picsum.photos/seed/result3/400/300" class="w-full h-full object-cover" alt="生成结果3">
                </div>
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover">
                    <img src="https://picsum.photos/seed/result4/400/300" class="w-full h-full object-cover" alt="生成结果4">
                </div>
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover">
                    <img src="https://picsum.photos/seed/result5/400/300" class="w-full h-full object-cover" alt="生成结果5">
                </div>
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover">
                    <img src="https://picsum.photos/seed/result6/400/300" class="w-full h-full object-cover" alt="生成结果6">
                </div>
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover">
                    <img src="https://picsum.photos/seed/result7/400/300" class="w-full h-full object-cover" alt="生成结果7">
                </div>
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover">
                    <img src="https://picsum.photos/seed/result8/400/300" class="w-full h-full object-cover" alt="生成结果8">
                </div>
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover">
                    <img src="https://picsum.photos/seed/result9/400/300" class="w-full h-full object-cover" alt="生成结果9">
                </div>
            </div>
        </section>

        <!-- 右侧预设面板 -->
        <aside class="w-64 h-full bg-[#12141a] border-l border-gray-800 p-4 overflow-y-auto scrollbar-hide">
            <div class="mb-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-medium">项目名称</span>
                    <button class="text-xs text-gray-400 hover:text-white">编辑</button>
                </div>
                <div class="bg-gray-800 rounded px-3 py-2 text-sm">项目-20260323-182141</div>
            </div>
            <div class="mb-4">
                <p class="text-xs text-gray-400 mb-2">预设动作</p>
                <div class="flex gap-2 mb-2">
                    <button class="flex-1 py-1 text-sm bg-gray-700 rounded">室内设计</button>
                    <button class="flex-1 py-1 text-sm bg-gray-800 rounded hover:bg-gray-700">建筑设计</button>
                </div>
                <p class="text-xs text-gray-400">作用对象: 整个项目 &nbsp; 点击照片显示操作</p>
            </div>
            <div class="space-y-2">
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm text-left px-3">万能融合</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm text-left px-3">平面布局</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm text-left px-3">空间分镜</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm text-left px-3">SU转效果图</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm text-left px-3">空间解构</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm text-left px-3">材料展版</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm text-left px-3">一键彩平</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm text-left px-3">景观彩平</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm text-left px-3">灯光氛围</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm text-left px-3">通道转换</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm text-left px-3">彩平转轴测图</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm text-left px-3">软装分析</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm text-left px-3">地域分析</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm text-left px-3">概念推演</button>
            </div>
        </aside>
    </main>

    <!-- 底部提示词输入栏 -->
    <footer class="h-16 border-t border-gray-800 bg-[#12141a] flex items-center px-4 gap-4">
        <div class="flex-1 relative">
            <input type="text" placeholder="描述你的创意灵感..." class="w-full bg-[#1e212b] rounded px-4 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gray-600">
        </div>
        <div class="flex items-center gap-2">
            <button class="p-2 rounded hover:bg-gray-800">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </button>
            <div class="flex items-center gap-1 text-xs">
                <button class="px-2 py-1 rounded bg-gray-700">质量</button>
                <button class="px-2 py-1 rounded hover:bg-gray-800">极速</button>
                <button class="px-2 py-1 rounded bg-gray-700">画质</button>
                <button class="px-2 py-1 rounded hover:bg-gray-800">画幅 Auto</button>
                <button class="px-2 py-1 rounded hover:bg-gray-800">分辨率 1K</button>
            </div>
            <div class="flex items-center gap-2">
                <button class="px-3 py-1 rounded bg-gray-800 hover:bg-gray-700 text-sm">批量 3张</button>
                <button class="px-4 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm flex items-center gap-1">
                    生成 <span class="text-xs">+6</span>
                </button>
            </div>
        </div>
    </footer>
</body>
</html>
