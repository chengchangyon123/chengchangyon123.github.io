<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI设计工具 - 完整版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 原有基础样式 */
        body {
            background-color: #0f1117;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .panel-hover { transition: all 0.2s ease; }
        .panel-hover:hover { border-color: #4b5563; }

        /* 新增：拖拽/粘贴 + 双击最大化样式 */
        .operate-area-drag-over {
            border-color: #3b82f6 !important;
            background: rgba(59, 130, 246, 0.1) !important;
        }
        .img-maximize-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .maximize-img-container {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }
        .maximize-img {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            border-radius: 4px;
        }
        .paste-tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #9ca3af;
            font-size: 14px;
            text-align: center;
            z-index: 1;
        }

        /* 图片位置编辑工具栏样式 */
        .img-position-toolbar {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e212b;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 10px 20px;
            display: none;
            gap: 15px;
            z-index: 100;
        }
        .position-btn {
            padding: 8px 12px;
            background: #0f1117;
            border: 1px solid #374151;
            border-radius: 4px;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .position-btn:hover {
            background: #374151;
        }
        .position-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
        }
        .position-input {
            width: 60px;
            background: #0f1117;
            border: 1px solid #374151;
            border-radius: 4px;
            padding: 8px;
            color: #e2e8f0;
            text-align: center;
        }

        /* 图片添加弹窗样式 */
        .add-img-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e212b;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 20px;
            z-index: 300;
            display: none;
            min-width: 400px;
        }
        .add-img-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .add-img-tabs {
            display: flex;
            border-bottom: 1px solid #374151;
            padding-bottom: 10px;
            gap: 20px;
        }
        .add-img-tab {
            cursor: pointer;
            padding: 5px 0;
            font-weight: 500;
            color: #9ca3af;
        }
        .add-img-tab.active {
            color: #e2e8f0;
            border-bottom: 2px solid #3b82f6;
        }
        .add-img-upload, .add-img-url {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .upload-area {
            border: 2px dashed #374151;
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover {
            border-color: #4b5563;
        }
        .upload-input {
            display: none;
        }
        .add-img-input {
            background: #0f1117;
            border: 1px solid #374151;
            border-radius: 4px;
            padding: 10px;
            color: #e2e8f0;
        }
        .add-img-btn {
            background: #3b82f6;
            border: none;
            border-radius: 4px;
            padding: 10px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .add-img-btn:hover {
            background: #2563eb;
        }
        .add-img-close {
            align-self: flex-end;
            padding: 8px 16px;
            background: #4b5563;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- 左侧操作区 -->
    <div class="w-1/3 h-full border-r border-gray-800 flex flex-col panel-hover relative">
        <div class="p-4 border-b border-gray-800 font-medium">操作区</div>
        <div id="operateImagesContainer" class="flex-1 p-4 overflow-y-auto scrollbar-hide grid grid-cols-2 gap-2">
            <!-- 图片会动态添加到这里 -->
        </div>
        <div class="p-4 border-t border-gray-800">
            <button id="addImageBtn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded">+ 添加图片</button>
        </div>
    </div>

    <!-- 右侧结果区 -->
    <div class="w-2/3 h-full flex flex-col">
        <div class="p-4 border-b border-gray-800 font-medium">生成结果区</div>
        <div id="resultImagesContainer" class="flex-1 p-4 overflow-y-auto scrollbar-hide grid grid-cols-3 gap-2">
            <!-- 示例结果图 -->
            <div class="result-img-item border border-gray-800 rounded overflow-hidden draggable" draggable="true">
                <img src="https://picsum.photos/400/300?random=1" class="w-full h-auto" alt="示例图1">
            </div>
            <div class="result-img-item border border-gray-800 rounded overflow-hidden draggable" draggable="true">
                <img src="https://picsum.photos/400/300?random=2" class="w-full h-auto" alt="示例图2">
            </div>
        </div>
    </div>

    <!-- 新增：图片添加弹窗 -->
    <div id="addImgModal" class="add-img-modal">
        <div class="add-img-content">
            <h3>添加图片</h3>
            <div class="add-img-tabs">
                <div class="add-img-tab active" data-tab="upload">本地上传</div>
                <div class="add-img-tab" data-tab="url">图片链接</div>
            </div>
            <div class="add-img-upload" id="uploadTabContent">
                <div class="upload-area" id="uploadArea">
                    <p>点击或拖拽图片到此处上传</p>
                    <p class="text-xs text-gray-400">支持JPG/PNG/WebP格式</p>
                    <input type="file" class="upload-input" id="uploadInput" accept="image/*" multiple>
                </div>
                <button class="add-img-btn" id="confirmUploadBtn">确认添加到操作区</button>
            </div>
            <div class="add-img-url" id="urlTabContent" style="display: none;">
                <input type="text" class="add-img-input" id="imgUrlInput" placeholder="请输入图片URL（如：https://xxx.jpg）">
                <button class="add-img-btn" id="confirmUrlBtn">确认添加到操作区</button>
            </div>
            <button class="add-img-close" id="closeAddImgBtn">关闭</button>
        </div>
    </div>

    <!-- 新增：图片位置编辑工具栏 -->
    <div id="imgPositionToolbar" class="img-position-toolbar">
        <button class="position-btn" id="moveUpBtn">上移</button>
        <button class="position-btn" id="moveDownBtn">下移</button>
        <button class="position-btn" id="moveToTopBtn">置顶</button>
        <button class="position-btn" id="moveToBottomBtn">置底</button>
        <span>移动到位置：</span>
        <input type="number" class="position-input" id="targetPositionInput" min="1">
        <button class="position-btn" id="moveToPositionBtn">确认</button>
        <button class="position-btn" id="closePositionToolbarBtn">关闭</button>
    </div>

    <!-- 新增：图片最大化容器 -->
    <div id="imgMaximizeMask" class="img-maximize-mask" style="display: none;">
        <div class="maximize-img-container">
            <img id="maximizeImg" class="maximize-img" src="" alt="最大化图片">
        </div>
    </div>

    <script>
        // 全局变量
        let custom_selectedImgItem = null;
        let custom_isProcessingImg = false;

        // 1. 基础函数：更新操作区图片序号
        function custom_updateImageNumbers() {
            const items = document.querySelectorAll('.operate-img-item .operate-img-number');
            items.forEach((item, index) => {
                item.textContent = index + 1;
            });
        }

        // 2. 核心函数：添加图片到操作区
        function custom_addImageToOperateArea(imgSrc) {
            const operateContainer = document.getElementById('operateImagesContainer');
            if (!operateContainer) return;

            const imgItem = document.createElement('div');
            imgItem.className = 'operate-img-item border border-gray-800 rounded overflow-hidden draggable';
            imgItem.setAttribute('draggable', true);
            
            imgItem.innerHTML = `
                <div class="operate-img-number absolute top-1 left-1 bg-black/50 text-white text-xs px-1">${operateContainer.children.length + 1}</div>
                <img src="${imgSrc}" class="operate-img w-full h-auto" alt="操作图片">
            `;

            // 绑定双击最大化
            custom_bindImgDoubleClick(imgItem);
            
            // 绑定选中事件
            imgItem.addEventListener('click', (e) => {
                if (custom_selectedImgItem) {
                    custom_selectedImgItem.style.border = '1px solid #374151';
                }
                custom_selectedImgItem = imgItem;
                imgItem.style.border = '2px solid #3b82f6';
                
                const toolbar = document.getElementById('imgPositionToolbar');
                if (toolbar) {
                    toolbar.style.display = 'flex';
                    const currentIndex = Array.from(operateContainer.children).indexOf(imgItem) + 1;
                    const posInput = document.getElementById('targetPositionInput');
                    if (posInput) posInput.value = currentIndex;
                }
            });

            operateContainer.appendChild(imgItem);
            custom_updateImageNumbers();
        }

        // 3. 绑定图片双击最大化
        function custom_bindImgDoubleClick(imgItem) {
            imgItem.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                const img = imgItem.querySelector('img');
                if (!img || !img.src) return;

                // 显示最大化遮罩
                const maximizeMask = document.getElementById('imgMaximizeMask');
                const maximizeImg = document.getElementById('maximizeImg');
                maximizeImg.src = img.src;
                maximizeMask.style.display = 'flex';

                // 模拟打开修改界面（延迟300ms）
                setTimeout(() => {
                    maximizeMask.style.display = 'none';
                    alert(`已打开【${img.alt}】的修改界面！`);
                    // 实际项目中替换为你的修改界面打开逻辑
                }, 300);
            });
        }

        // 4. 初始化操作区拖拽/粘贴
        function custom_initOperateAreaImgAdd() {
            const operatePanel = document.querySelector('.panel-hover');
            if (!operatePanel) return;

            // 阻止默认拖拽行为
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                operatePanel.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                }, false);
            });

            // 拖拽样式
            operatePanel.addEventListener('dragenter', () => {
                operatePanel.classList.add('operate-area-drag-over');
            });
            operatePanel.addEventListener('dragleave', () => {
                operatePanel.classList.remove('operate-area-drag-over');
            });
            operatePanel.addEventListener('drop', () => {
                operatePanel.classList.remove('operate-area-drag-over');
            });

            // 处理拖拽文件
            operatePanel.addEventListener('drop', (e) => {
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    Array.from(files).forEach(file => {
                        if (file.type.startsWith('image/')) {
                            const reader = new FileReader();
                            reader.onload = function(e) {
                                custom_addImageToOperateArea(e.target.result);
                            };
                            reader.readAsDataURL(file);
                        }
                    });
                }
            });

            // 处理粘贴
            operatePanel.addEventListener('paste', (e) => {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let item of items) {
                    if (item.kind === 'file' && item.type.startsWith('image/')) {
                        const file = item.getAsFile();
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            custom_addImageToOperateArea(e.target.result);
                        };
                        reader.readAsDataURL(file);
                        break;
                    }
                }
            });

            // 粘贴提示
            const pasteTip = document.createElement('div');
            pasteTip.className = 'paste-tip';
            pasteTip.innerHTML = 'Ctrl+V粘贴图片<br>或拖拽图片到此处';
            operatePanel.appendChild(pasteTip);
        }

        // 5. 初始化结果区拖拽到操作区
        function custom_initResultToOperateDrag() {
            const resultContainer = document.getElementById('resultImagesContainer');
            if (!resultContainer) return;

            // 拖拽开始
            resultContainer.addEventListener('dragstart', (e) => {
                const dragItem = e.target.closest('.result-img-item');
                if (dragItem) {
                    const imgSrc = dragItem.querySelector('img').src;
                    e.dataTransfer.setData('text/plain', imgSrc);
                }
            });

            // 拖拽落地到操作区
            document.addEventListener('drop', (e) => {
                e.preventDefault();
                const operatePanel = document.querySelector('.panel-hover');
                if (operatePanel && operatePanel.contains(e.target)) {
                    const text = e.dataTransfer.getData('text/plain');
                    if (text && text.startsWith('http')) {
                        custom_addImageToOperateArea(text);
                    }
                }
            });

            // 结果区粘贴到操作区
            resultContainer.addEventListener('paste', (e) => {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let item of items) {
                    if (item.kind === 'file' && item.type.startsWith('image/')) {
                        const file = item.getAsFile();
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            custom_addImageToOperateArea(e.target.result);
                        };
                        reader.readAsDataURL(file);
                        break;
                    }
                }
            });
        }

        // 6. 初始化图片位置编辑
        function custom_initImagePositionEdit() {
            const toolbar = document.getElementById('imgPositionToolbar');
            if (!toolbar) return;

            // 上移
            document.getElementById('moveUpBtn').addEventListener('click', () => {
                if (!custom_selectedImgItem) return;
                const parent = custom_selectedImgItem.parentNode;
                const siblings = Array.from(parent.children);
                const idx = siblings.indexOf(custom_selectedImgItem);
                if (idx > 0) {
                    parent.insertBefore(custom_selectedImgItem, siblings[idx - 1]);
                    custom_updateImageNumbers();
                    document.getElementById('targetPositionInput').value = idx;
                }
            });

            // 下移
            document.getElementById('moveDownBtn').addEventListener('click', () => {
                if (!custom_selectedImgItem) return;
                const parent = custom_selectedImgItem.parentNode;
                const siblings = Array.from(parent.children);
                const idx = siblings.indexOf(custom_selectedImgItem);
                if (idx < siblings.length - 1) {
                    parent.insertBefore(custom_selectedImgItem, siblings[idx + 2] || null);
                    custom_updateImageNumbers();
                    document.getElementById('targetPositionInput').value = idx + 2;
                }
            });

            // 置顶
            document.getElementById('moveToTopBtn').addEventListener('click', () => {
                if (!custom_selectedImgItem) return;
                const parent = custom_selectedImgItem.parentNode;
                parent.prepend(custom_selectedImgItem);
                custom_updateImageNumbers();
                document.getElementById('targetPositionInput').value = 1;
            });

            // 置底
            document.getElementById('moveToBottomBtn').addEventListener('click', () => {
                if (!custom_selectedImgItem) return;
                const parent = custom_selectedImgItem.parentNode;
                parent.appendChild(custom_selectedImgItem);
                custom_updateImageNumbers();
                document.getElementById('targetPositionInput').value = parent.children.length;
            });

            // 移动到指定位置
            document.getElementById('moveToPositionBtn').addEventListener('click', () => {
                if (!custom_selectedImgItem) return;
                const parent = custom_selectedImgItem.parentNode;
                const total = parent.children.length;
                const target = parseInt(document.getElementById('targetPositionInput').value);
                
                if (isNaN(target) || target < 1 || target > total) {
                    alert(`请输入1-${total}之间的数字！`);
                    return;
                }

                custom_selectedImgItem.remove();
                const siblings = Array.from(parent.children);
                if (target - 1 < siblings.length) {
                    parent.insertBefore(custom_selectedImgItem, siblings[target - 1]);
                } else {
                    parent.appendChild(custom_selectedImgItem);
                }
                custom_updateImageNumbers();
            });

            // 关闭工具栏
            document.getElementById('closePositionToolbarBtn').addEventListener('click', () => {
                toolbar.style.display = 'none';
                if (custom_selectedImgItem) {
                    custom_selectedImgItem.style.border = '1px solid #374151';
                    custom_selectedImgItem = null;
                }
            });
        }

        // 7. 初始化添加图片弹窗
        function custom_initAddImageModal() {
            const modal = document.getElementById('addImgModal');
            if (!modal) return;

            // 打开弹窗
            document.getElementById('addImageBtn').addEventListener('click', () => {
                modal.style.display = 'block';
            });

            // 切换标签
            document.querySelectorAll('.add-img-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.add-img-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const type = tab.getAttribute('data-tab');
                    document.getElementById('uploadTabContent').style.display = type === 'upload' ? 'flex' : 'none';
                    document.getElementById('urlTabContent').style.display = type === 'url' ? 'flex' : 'none';
                });
            });

            // 上传按钮点击
            document.getElementById('uploadArea').addEventListener('click', () => {
                document.getElementById('uploadInput').click();
            });

            // 确认上传
            document.getElementById('confirmUploadBtn').addEventListener('click', () => {
                const files = document.getElementById('uploadInput').files;
                if (files.length === 0) {
                    alert('请选择图片！');
                    return;
                }
                Array.from(files).forEach(file => {
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            custom_addImageToOperateArea(e.target.result);
                        };
                        reader.readAsDataURL(file);
                    }
                });
                modal.style.display = 'none';
            });

            // 确认URL添加
            document.getElementById('confirmUrlBtn').addEventListener('click', () => {
                const url = document.getElementById('imgUrlInput').value.trim();
                if (!url) {
                    alert('请输入图片URL！');
                    return;
                }
                custom_addImageToOperateArea(url);
                modal.style.display = 'none';
            });

            // 关闭弹窗
            document.getElementById('closeAddImgBtn').addEventListener('click', () => {
                modal.style.display = 'none';
            });
        }

        // 8. 初始化所有功能
        window.onload = function() {
            setTimeout(() => {
                custom_initOperateAreaImgAdd();
                custom_initResultToOperateDrag();
                custom_initImagePositionEdit();
                custom_initAddImageModal();
                
                // 绑定已有图片双击事件
                document.querySelectorAll('.operate-img-item, .result-img-item').forEach(item => {
                    custom_bindImgDoubleClick(item);
                });

                console.log('所有功能初始化完成！');
            }, 500);
        };
    </script>
</body>
</html>
