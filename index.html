<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Designer AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <button class="icon-btn ghost" id="toggleViewBtn" title="切换到下一个创作界面">
          <span>AI</span>
        </button>
        <div>
          <p class="eyebrow">智能创作</p>
          <h1>Designer AI</h1>
        </div>
      </div>
      <nav class="topnav">
        <a href="#">邀请加入</a>
        <a href="#">资源管理</a>
        <a href="#" id="loginBtn">登录</a>
        <button class="score-btn">积分 <span id="creditCount">60</span></button>
      </nav>
    </header>

    <main class="workspace">
      <section class="canvas-section">
        <div class="panel-head">
          <div>
            <p class="eyebrow" id="leftEyebrow">操作区</p>
            <h2 id="leftTitle">工作区</h2>
          </div>
          <span class="panel-hint" id="leftHint">拖入图片、整理方案、再一键生成</span>
        </div>

        <div class="drop-zone" id="workspaceZone">
          <div class="empty-state" id="workspaceEmpty">
            <h3>拖入或上传参考图</h3>
            <p>支持从本地上传，也可以把外部软件导出的图片拖入此区域。</p>
            <div class="empty-actions">
              <button class="primary-btn" id="uploadBtn">上传图片</button>
              <button class="secondary-btn" id="useDemoBtn">加载示例</button>
            </div>
          </div>
          <div class="image-grid" id="workspaceGrid"></div>
          <input type="file" id="fileInput" accept="image/*" multiple hidden>
        </div>

        <div class="toolbar">
          <select id="qualitySelect">
            <option>高质</option>
            <option>标准</option>
            <option>快速</option>
          </select>
          <select id="styleSelect">
            <option>标签</option>
            <option>建筑</option>
            <option>室内</option>
            <option>景观</option>
          </select>
          <select id="countSelect">
            <option value="1">1:1</option>
            <option value="2">1:2</option>
            <option value="4">1:4</option>
          </select>
          <select id="ratioSelect">
            <option>分辨率 1K</option>
            <option>分辨率 2K</option>
            <option>分辨率 4K</option>
          </select>
          <select id="sceneSelect">
            <option>场景</option>
            <option>办公</option>
            <option>住宅</option>
            <option>展厅</option>
          </select>
          <select id="angleSelect">
            <option>镜头</option>
            <option>广角</option>
            <option>鸟瞰</option>
            <option>近景</option>
          </select>
        </div>
      </section>

      <section class="result-section">
        <div class="panel-head">
          <div>
            <p class="eyebrow">生成结果区</p>
            <h2 id="rightTitle">生成区</h2>
          </div>
          <div class="panel-meta">
            <span class="status-badge" id="modeBadge">自定义预设</span>
            <span class="model-badge">模型: <strong id="modelName">Nano Banana 2</strong></span>
          </div>
        </div>

        <div class="result-board" id="resultBoard">
          <div class="result-empty" id="resultEmpty">
            <h3>结果会显示在这里</h3>
            <p>点击右侧任一预设，底部提示词会自动填充。上传图片后点击生成，即可得到候选方案。</p>
          </div>
          <div class="result-grid" id="resultGrid"></div>
        </div>
      </section>

      <aside class="preset-sidebar">
        <div class="sidebar-head">
          <h3>右侧预设</h3>
          <button class="text-btn" id="expandPresetBtn">自定义预设</button>
        </div>
        <div class="preset-list" id="presetList"></div>
      </aside>
    </main>

    <footer class="prompt-bar">
      <div class="prompt-main">
        <div class="inline-switches">
          <button class="chip active" data-mode="workspace">创意</button>
          <button class="chip" data-mode="edit">改图</button>
          <button class="chip auto-chip" id="autoSyncChip">Auto</button>
          <span class="token-pill">1K</span>
        </div>
        <div class="prompt-input-wrap">
          <textarea id="promptInput" rows="1" placeholder="输入提示词，或点击右侧预设自动填充..."></textarea>
          <button class="icon-btn primary-round" id="sendBtn" title="生成">
            <span>&uarr;</span>
          </button>
        </div>
      </div>
      <div class="footer-actions">
        <button class="secondary-btn" id="prevBtn">前退</button>
        <button class="primary-btn" id="generateBtn">生成(消耗 50 积分)</button>
      </div>
    </footer>
  </div>

  <div class="modal hidden" id="editModal" aria-hidden="true">
    <div class="modal-backdrop" id="closeEditModal"></div>
    <div class="modal-content">
      <button class="modal-close" id="closeEditBtn">&times;</button>
      <aside class="edit-tools">
        <div class="tool-card">
          <h3>图像修改面板</h3>
          <label>明度<input type="range" min="0" max="100" value="68"></label>
          <label>饱和度<input type="range" min="0" max="100" value="52"></label>
          <div class="color-row">
            <span class="swatch red"></span>
            <span class="swatch green"></span>
            <span class="swatch yellow"></span>
            <span class="swatch blue"></span>
            <span class="swatch white"></span>
          </div>
        </div>
        <div class="tool-card">
          <h3>文字覆盖</h3>
          <label>字号
            <select>
              <option>大</option>
              <option selected>中</option>
              <option>小</option>
            </select>
          </label>
          <label>颜色
            <div class="color-row">
              <span class="swatch red"></span>
              <span class="swatch green"></span>
              <span class="swatch yellow"></span>
              <span class="swatch blue"></span>
              <span class="swatch white"></span>
            </div>
          </label>
        </div>
        <div class="tool-card">
          <h3>清除与标注</h3>
          <label>透明度<input type="range" min="0" max="100" value="40"></label>
          <button class="secondary-btn block-btn">清除左半区域</button>
        </div>
      </aside>

      <section class="edit-stage">
        <div class="edit-stage-top">
          <div class="compare-tabs">
            <button class="chip active">查询点</button>
            <button class="chip">文案</button>
            <button class="chip">标注</button>
            <button class="chip">涂抹修改</button>
          </div>
          <div class="compare-actions">
            <span>原图与现图对比</span>
            <button class="icon-btn ghost">◧</button>
            <button class="icon-btn ghost">⤓</button>
            <button class="icon-btn ghost">🗑</button>
          </div>
        </div>

        <div class="edit-preview-wrap">
          <img id="editPreview" alt="编辑预览">
          <div class="edit-overlay">双击图片可返回“修改”界面，底部输入框与主界面保持一致</div>
        </div>

        <div class="prompt-main edit-prompt">
          <div class="inline-switches">
            <button class="chip">创意</button>
            <button class="chip active">改图</button>
            <button class="chip auto-chip">Auto</button>
            <span class="token-pill">1K</span>
          </div>
          <div class="prompt-input-wrap">
            <textarea id="editPromptInput" rows="1" placeholder="在这里输入局部修改要求..."></textarea>
            <button class="icon-btn primary-round" id="applyEditBtn">
              <span>&uarr;</span>
            </button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <template id="workspaceItemTpl">
    <article class="image-card">
      <img alt="参考图">
      <div class="image-card-bar">
        <span class="image-tag">参考图</span>
        <div class="image-actions">
          <button class="mini-btn edit-source-btn">修改</button>
          <button class="mini-btn remove-source-btn">删除</button>
        </div>
      </div>
    </article>
  </template>

  <template id="resultItemTpl">
    <article class="result-card">
      <img alt="生成结果">
      <div class="result-mask">
        <button class="mini-btn result-edit-btn">修改</button>
        <button class="mini-btn result-download-btn">下载</button>
        <button class="mini-btn result-delete-btn">删除</button>
      </div>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
