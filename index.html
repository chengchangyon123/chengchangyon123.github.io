<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 设计工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f1117;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .panel-hover { transition: all 0.2s ease; }
        .panel-hover:hover { border-color: #4b5563; }

        /* 拖拽分割条样式 */
        .gutter {
            background-color: #1e212b;
            cursor: col-resize;
            width: 6px;
            margin: 0 -3px;
            border-left: 1px solid #374151;
            border-right: 1px solid #374151;
            position: relative;
            z-index: 10;
            transition: background 0.2s;
        }
        .gutter:hover { background-color: #4b5563; }
        .gutter::after {
            content: "||";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: #6b7280;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <!-- 顶部导航 -->
    <header class="h-12 flex items-center justify-between px-4 border-b border-gray-800 bg-[#12141a]">
        <div class="flex items-center gap-2">
            <button class="p-2 rounded hover:bg-gray-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <span class="text-sm text-gray-400">返回创作风暴</span>
        </div>
        <div class="flex items-center gap-4">
            <button class="text-sm px-3 py-1 rounded hover:bg-gray-800">邀请加入</button>
            <button class="text-sm px-3 py-1 rounded hover:bg-gray-800">资源管理</button>
            <div class="relative group">
                <button class="text-sm px-3 py-1 rounded bg-gray-800 hover:bg-gray-700 flex items-center gap-1">
                    <span>积分: 2870</span>
                </button>
                <div class="absolute right-0 top-full mt-2 w-48 bg-[#1e212b] rounded shadow-lg border border-gray-700 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                    <div class="p-3 border-b border-gray-700">
                        <p class="text-xs text-gray-400">当前积分: 2870</p>
                    </div>
                    <button class="w-full text-left px-3 py-2 text-sm hover:bg-gray-800">充值积分</button>
                    <button class="w-full text-left px-3 py-2 text-sm hover:bg-gray-800">收费标准</button>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区 + 拖拽布局 -->
    <main id="mainContainer" class="flex-1 flex overflow-hidden relative">
        <!-- 左侧操作区 -->
        <section id="leftPanel" class="h-full flex flex-col p-4 border-r border-gray-800" style="width:45%;min-width:300px;max-width:70%;">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs text-gray-400">操作区</span>
            </div>
            <div class="flex-1 border-2 border-dashed border-gray-700 rounded-lg p-2 relative panel-hover overflow-hidden">
                <img src="https://picsum.photos/seed/building/800/1000" class="w-full h-full object-cover rounded" alt="上传图片">
                <button class="absolute bottom-2 right-2 w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center hover:bg-gray-700">+</button>
            </div>
            <div class="mt-4">
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">左侧修改功能</button>
            </div>
        </section>

        <!-- 拖拽分割条 -->
        <div id="dragGutter" class="gutter"></div>

        <!-- 中间生成区 -->
        <section id="rightPanel" class="flex-1 h-full p-4 overflow-y-auto scrollbar-hide">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs text-gray-400">生成结果区</span>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover"><img src="https://picsum.photos/seed/result1/400/300" class="w-full h-full object-cover"></div>
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover"><img src="https://picsum.photos/seed/result2/400/300" class="w-full h-full object-cover"></div>
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover"><img src="https://picsum.photos/seed/result3/400/300" class="w-full h-full object-cover"></div>
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover"><img src="https://picsum.photos/seed/result4/400/300" class="w-full h-full object-cover"></div>
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover"><img src="https://picsum.photos/seed/result5/400/300" class="w-full h-full object-cover"></div>
                <div class="aspect-[4/3] bg-gray-800 rounded overflow-hidden panel-hover"><img src="https://picsum.photos/seed/result6/400/300" class="w-full h-full object-cover"></div>
            </div>
        </section>

        <!-- 右侧预设区 -->
        <aside class="w-64 h-full bg-[#12141a] border-l border-gray-800 p-4 overflow-y-auto scrollbar-hide">
            <div class="mb-4">
                <span class="text-sm font-medium">右侧预设键</span>
            </div>
            <div class="space-y-2">
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">超级融合</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">平面布局</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">空间分镜</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">SU转效果图</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">空间爆炸</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">材料排版</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">一键彩平</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">景观彩平</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">灯光氛围</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">通道转换</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">彩平转轴测图</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">软装分析</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">地域分析</button>
                <button class="w-full py-2 bg-gray-800 rounded hover:bg-gray-700 text-sm">概念推演</button>
            </div>
        </aside>
    </main>

    <!-- 底部输入栏 -->
    <footer class="h-16 border-t border-gray-800 bg-[#12141a] flex items-center px-4 gap-4">
        <div class="flex-1 relative">
            <input type="text" placeholder="输入提示词..." class="w-full bg-[#1e212b] rounded px-4 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gray-600">
        </div>
        <button class="px-4 py-2 rounded bg-blue-600 hover:bg-blue-500 text-sm">生成</button>
    </footer>

    <!-- 拖拽功能 JS -->
    <script>
        const leftPanel = document.getElementById('leftPanel');
        const rightPanel = document.getElementById('rightPanel');
        const gutter = document.getElementById('dragGutter');
        const container = document.getElementById('mainContainer');

        let isDragging = false;

        gutter.addEventListener('mousedown', (e) => {
            isDragging = true;
            document.body.style.cursor = 'col-resize';
            e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const containerRect = container.getBoundingClientRect();
            const percent = (e.clientX - containerRect.left) / containerRect.width * 100;
            
            // 限制最小/最大宽度
            if(percent > 25 && percent < 70){
                leftPanel.style.width = percent + '%';
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            document.body.style.cursor = '';
        });
    </script>
</body>
</html>
