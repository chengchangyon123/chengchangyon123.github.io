    <!-- Tailwind CSS 加载优化：CDN + 本地降级 -->
    <script>
        // 优先加载CDN，失败则加载本地备用
        function loadTailwind() {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'https://cdn.tailwindcss.com';
            link.onerror = function() {
                const localLink = document.createElement('link');
                localLink.rel = 'stylesheet';
                localLink.href = './tailwind-local.css'; // 需提前打包本地版本
                document.head.appendChild(localLink);
            };
            document.head.appendChild(link);
        }
        loadTailwind();
    </script>

    <!-- 核心工具函数 -->
    <script>
        // ========== 安全工具函数 ==========
        // XSS过滤函数
        function sanitizeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, function(match) {
                const entities = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                };
                return entities[match];
            });
        }

        // ========== 权限校验函数 ==========
        function checkAuth() {
            const isLogin = localStorage.getItem('userToken');
            if (!isLogin) {
                modalManager.open('login-modal');
                return false;
            }
            return true;
        }

        // ========== 模态框管理 ==========
        const modalManager = {
            activeModals: [],
            open(modalId) {
                this.closeAll();
                const modal = document.getElementById(modalId);
                if (!modal) return;
                modal.style.display = 'block';
                if (modalId === 'invite-modal' || modalId === 'score-modal' || modalId === 'login-modal') {
                    modal.style.display = 'block'; // 居中弹窗
                } else {
                    modal.style.display = 'flex'; // 全屏弹窗
                }
                this.activeModals.push(modalId);
                
                // 点击空白处关闭
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) this.close(modalId);
                }, { once: true });
                
                // 键盘ESC关闭
                const escHandler = (e) => {
                    if (e.key === 'Escape') {
                        this.close(modalId);
                        document.removeEventListener('keydown', escHandler);
                    }
                };
                document.addEventListener('keydown', escHandler);
            },
            close(modalId) {
                const modal = document.getElementById(modalId);
                if (modal) {
                    modal.style.display = 'none';
                }
                this.activeModals = this.activeModals.filter(id => id !== modalId);
            },
            closeAll() {
                this.activeModals.forEach(id => this.close(id));
                this.activeModals = [];
            }
        };

        // ========== 加载状态管理 ==========
        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // ========== 防抖函数 ==========
        function debounce(fn, delay = 100) {
            let timer = null;
            return function(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }

        // ========== 图片上传验证 ==========
        function validateImageFile(file) {
            // 1. 验证文件大小（10MB限制）
            if (file.size > 10 * 1024 * 1024) {
                alert(`文件${file.name}超过10MB，无法上传`);
                return false;
            }
            
            // 2. 验证MIME类型
            const validTypes = ['image/png', 'image/jpeg', 'image/webp', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                alert(`文件${file.name}不是合法图片类型（仅支持PNG/JPEG/WEBP/GIF）`);
                return false;
            }
            
            return true;
        }

        // 校验文件头（异步）
        function validateImageHeader(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsArrayBuffer(file.slice(0, 4));
                reader.onload = function() {
                    const header = new Uint8Array(this.result);
                    const isJPEG = header[0] === 0xFF && header[1] === 0xD8 && header[2] === 0xFF;
                    const isPNG = header[0] === 0x89 && header[1] === 0x50 && header[2] === 0x4E && header[3] === 0x47;
                    const isWEBP = header[0] === 0x52 && header[1] === 0x49 && header[2] === 0x46 && header[3] === 0x46;
                    const isGIF = header[0] === 0x47 && header[1] === 0x49 && header[2] === 0x46 && header[3] === 0x38;
                    
                    if (!isJPEG && !isPNG && !isWEBP && !isGIF) {
                        alert(`文件${file.name}不是有效图片文件`);
                        resolve(false);
                        return;
                    }
                    resolve(true);
                };
                reader.onerror = () => resolve(false);
            });
        }

        // ========== 拖拽边界校验 ==========
        function onDragEnd(event) {
            const target = event.target;
            const container = document.getElementById('operateImagesContainer');
            // 确保元素始终在容器内
            if (container && !container.contains(target)) {
                container.appendChild(target);
            }
            target.classList.remove('img-item-dragging');
            // 移除所有占位符
            document.querySelectorAll('.img-drop-placeholder').forEach(el => el.remove());
        }

        // ========== 兼容性检测 ==========
        function checkBrowserCompatibility() {
            // 检测aspect-ratio支持
            const testDiv = document.createElement('div');
            testDiv.style.aspectRatio = '1/1';
            if (!testDiv.style.aspectRatio) {
                document.documentElement.classList.add('no-aspect-ratio');
            }

            // 检测FileReader支持
            if (!window.FileReader) {
                alert('您的浏览器版本过低，不支持图片上传功能，请升级到Chrome/Firefox/Edge等现代浏览器');
            }

            // 检测拖拽API支持
            if (!('draggable' in document.createElement('div'))) {
                alert('您的浏览器不支持拖拽功能，部分操作将无法使用');
            }
        }

        // ========== 图片懒加载 ==========
        function initImageLazyLoad() {
            if (!('IntersectionObserver' in window)) {
                // 降级方案：直接加载所有图片
                document.querySelectorAll('img[data-src]').forEach(img => {
                    img.src = img.dataset.src;
                    img.removeAttribute('data-src');
                });
                return;
            }

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.removeAttribute('data-src');
                        observer.unobserve(img);
                    }
                });
            });

            document.querySelectorAll('img[data-src]').forEach(img => observer.observe(img));
        }

        // ========== 初始化函数 ==========
        document.addEventListener('DOMContentLoaded', function() {
            // 兼容性检测
            checkBrowserCompatibility();
            
            // 初始化懒加载
            initImageLazyLoad();

            // ========== 拖拽分割条逻辑（防抖优化） ==========
            const dragGutter = document.getElementById('dragGutter');
            const leftPanel = document.getElementById('leftPanel');
            let isDragging = false;

            dragGutter.addEventListener('mousedown', function(e) {
                isDragging = true;
                document.body.style.cursor = 'col-resize';
                e.preventDefault();
            });

            document.addEventListener('mousemove', debounce(function(e) {
                if (!isDragging || !leftPanel) return;
                
                const mainContainer = document.getElementById('mainContainer');
                const containerRect = mainContainer.getBoundingClientRect();
                const containerWidth = containerRect.width;
                // 计算相对容器的位置
                const x = e.clientX - containerRect.left;
                const leftPanelWidth = (x / containerWidth) * 100;
                
                // 限制最小30%，最大70%
                if (leftPanelWidth < 30 || leftPanelWidth > 70) return;
                
                leftPanel.style.width = `${leftPanelWidth}%`;
            }, 16)); // 60fps

            document.addEventListener('mouseup', function() {
                isDragging = false;
                document.body.style.cursor = 'default';
            });

            // ========== 图片上传逻辑（安全校验） ==========
            const addImageBtn = document.getElementById('addImageBtn');
            if (addImageBtn) {
                addImageBtn.addEventListener('click', function() {
                    if (!checkAuth()) return;
                    
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/png,image/jpeg,image/webp,image/gif';
                    input.multiple = true;
                    
                    input.onchange = async function(e) {
                        const files = e.target.files;
                        if (!files.length) return;
                        
                        showLoading();
                        try {
                            for (let file of files) {
                                // 基础校验
                                if (!validateImageFile(file)) continue;
                                // 文件头校验
                                const isValidHeader = await validateImageHeader(file);
                                if (!isValidHeader) continue;
                                
                                // 处理合法图片（示例：创建预览元素）
                                const reader = new FileReader();
                                reader.readAsDataURL(file);
                                reader.onload = function() {
                                    const imgContainer = document.getElementById('operateImagesContainer');
                                    const imgItem = document.createElement('div');
                                    imgItem.className = 'operate-img-item';
                                    imgItem.draggable = true;
                                    imgItem.innerHTML = `
                                        <div class="operate-img-number">${imgContainer.children.length + 1}</div>
                                        <img class="operate-img" data-src="${sanitizeHTML(this.result)}" loading="lazy" alt="上传图片">
                                    `;
                                    imgItem.addEventListener('dragstart', () => imgItem.classList.add('img-item-dragging'));
                                    imgItem.addEventListener('dragend', onDragEnd);
                                    imgContainer.appendChild(imgItem);
                                    
                                    // 触发懒加载
                                    initImageLazyLoad();
                                };
                            }
                        } catch (error) {
                            console.error('图片上传处理失败：', error);
                            alert('图片处理失败，请重试');
                        } finally {
                            hideLoading();
                        }
                    };
                    input.click();
                });
            }

            // ========== 模态框事件绑定 ==========
            // 登录按钮
            const loginBtn = document.getElementById('loginBtn');
            if (loginBtn) {
                loginBtn.addEventListener('click', () => modalManager.open('login-modal'));
            }

            // 登录关闭按钮
            const loginClose = document.getElementById('login-close');
            if (loginClose) {
                loginClose.addEventListener('click', () => modalManager.close('login-modal'));
            }

            // 积分按钮
            const scoreBtn = document.getElementById('scoreBtn');
            if (scoreBtn) {
                scoreBtn.addEventListener('click', () => {
                    if (checkAuth()) modalManager.open('score-modal');
                });
            }

            // 积分关闭按钮
            const scoreClose = document.querySelector('.score-close');
            if (scoreClose) {
                scoreClose.addEventListener('click', () => modalManager.close('score-modal'));
            }

            // 邀请按钮
            const inviteBtn = document.getElementById('inviteBtn');
            if (inviteBtn) {
                inviteBtn.addEventListener('click', () => {
                    if (checkAuth()) modalManager.open('invite-modal');
                });
            }

            // 邀请关闭按钮
            const inviteClose = document.querySelector('.invite-close');
            if (inviteClose) {
                inviteClose.addEventListener('click', () => modalManager.close('invite-modal'));
            }

            // 充值按钮
            const rechargeBtn = document.getElementById('rechargeBtn');
            if (rechargeBtn) {
                rechargeBtn.addEventListener('click', () => {
                    if (checkAuth()) {
                        // 充值逻辑
                        alert('跳转到充值页面');
                    }
                });
            }

            // ========== 创作风暴切换 ==========
            const backToText2Img = document.getElementById('backToText2Img');
            if (backToText2Img) {
                backToText2Img.addEventListener('click', () => {
                    modalManager.open('text2img-interface');
                });
            }

            // 文字生图关闭按钮
            const text2imgClose = document.querySelector('.text2img-close');
            if (text2imgClose) {
                text2imgClose.addEventListener('click', () => modalManager.close('text2img-interface'));
            }

            // 历史记录关闭按钮
            const historyClose = document.querySelector('.history-close');
            if (historyClose) {
                historyClose.addEventListener('click', () => modalManager.close('history-interface'));
            }
        });
    </script>
</head>
<body class="h-screen flex flex-col overflow-hidden">

            <button id="inviteBtn" class="text-sm px-3 py-1 rounded hover:bg-gray-800" tabindex="0">邀请加入</button>
            <button id="resourceBtn" class="text-sm px-3 py-1 rounded hover:bg-gray-800" tabindex="0">资源管理</button>
            <!-- 新增登录按钮 -->

            <div class="relative group">
                <button id="scoreBtn" class="text-sm px-3 py-1 rounded bg-gray-800 hover:bg-gray-700 flex items-center gap-1" tabindex="0">

                </button>

                    <div class="p-3 border-b border-gray-700">
                        <p class="text-xs text-gray-400">当前积分</p> <!-- 移除积分数字 -->
                    </div>
                    <button id="rechargeBtn" class="w-full text-left px-3 py-2 text-sm hover:bg-gray-800" tabindex="0">充值积分</button>
                    <button id="priceRuleBtn" class="w-full text-left px-3 py-2 text-sm hover:bg-gray-800" tabindex="0">收费标准</button>

                <button id="addImageBtn" class="absolute bottom-2 right-2 w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center hover:bg-gray-700" tabindex="0">+</button>
            </div>
        </section>

        <!-- 拖拽分割条 -->

        <!-- 中间生成区 -->

    <!-- 图片预览模态框 -->

    <!-- 积分弹窗 -->
